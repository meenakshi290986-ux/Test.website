<!DOCTYPE html>

<html>

<head>

  <meta charset="UTF-8">

  <title>Prakriti's Bookmark Store</title>

  <style>

    body {

      font-family: Arial, sans-serif;

      background-color: #fff0f5;

      text-align: center;

      margin: 0;

      padding: 0;

    }

    header {

      background-color: #ff66b2;

      color: white;

      padding: 20px;

      font-size: 28px;

    }

    .product {

      background-color: white;

      margin: 30px auto;

      padding: 20px;

      width: 250px;

      border-radius: 15px;

      box-shadow: 0 4px 10px rgba(0,0,0,0.1);

    }

    button {

      background-color: #ff3399;

      color: white;

      padding: 10px 15px;

      border: none;

      border-radius: 8px;

      cursor: pointer;

      font-size: 14px;

    }

    button:hover {

      background-color: #cc0066;

    }

  </style>

</head>

<body>

  <header>

    📚 Prakriti's Cute Bookmark Store 💖

  </header>

  <div class="product">

    <h2>Floral Bookmark 🌸</h2>

    <p>Price: ₹50</p>

    <button onclick="order()">Order Now</button>

  </div>

  <div class="product">

    <h2>Aesthetic Quote Bookmark ✨</h2>

    <p>Price: ₹50</p>

    <button onclick="order()">Order Now</button>

  </div>

  <div class="product">

    <h2>Cartoon Bookmark 🐻</h2>

    <p>Price: ₹50</p>

    <button onclick="order()">Order Now</button>

  </div>

  <script>

    function order() {

      alert("Thank you for your order! Please contact me on WhatsApp to confirm 💕");

    }

  </script>

</body>

</html>
