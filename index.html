
<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prakriti Store 💜</title><style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f8f5ff;
}

.header {
  background: #e6dbff;
  text-align: center;
  padding: 15px;
  position: sticky;
  top: 0;
}

.logo {
  width: 90px;
  border-radius: 50%;
  object-fit: cover;
}

.hero {
  background: #d9ccff;
  text-align: center;
  padding: 40px 20px;
}

.hero h1 {
  font-size: 30px;
  color: white;
}

.shop-btn {
  margin-top: 15px;
  padding: 10px 20px;
  background: white;
  border: none;
  border-radius: 20px;
}

.categories {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 15px;
}

.cat-btn {
  padding: 10px 18px;
  background: #e6dbff;
  border-radius: 20px;
  border: none;
  white-space: nowrap;
}

.section-box {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.section-box button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #e6dbff;
}

.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  position: relative;
}

.card img {
  width: 100%;
  border-radius: 12px;
}

.sold {
  position: absolute;
  top: 10px;
  left: 10px;
  color: red;
  font-weight: bold;
}

.view-all {
  display: block;
  margin: 20px auto;
  padding: 10px 20px;
  background: #e6dbff;
  border: none;
  border-radius: 10px;
}

.product-page {
  display: none;
  padding: 20px;
}

.back {
  margin-bottom: 10px;
}
</style></head><body><div class="header">
  <img src= "https://github.com/meenakshi290986-ux/Test.website/raw/main/IMG-20260328-WA0028.jpg"
    class="logo">
</div><div class="hero">
</h1> Prakriti Store💗</h1>
  <button class="shop-btn" onclick="scrollToProducts()">SHOP NOW</button>
</div><!-- CUSTOM BOOKMARK WHITE BOX --><div class="section-box">
  <h2>Custom Bookmark</h2>
  <p>Get your own personalised bookmark 💜</p>
  <button onclick="orderWhatsApp(buynow)</button>
</div><div class="categories">
  <button class="cat-btn" onclick="filter('all')">All</button>
  <button class="cat-btn" onclick="filter('cards')">Handmade Cards</button>
  <button class="cat-btn" onclick="filter('printed')">Bookmarks</button>
</div><div class="products" id="products"></div><button class="view-all" onclick="showAll()">View All</button>

<div class="product-page" id="productPage"></div><script>
const items = [
  {
    name: 'Handmade Card Set',
    price: '₹100',
    category: 'cards',
    img:'https://via.placeholder.com/200',
  sold: false
  },
  {
  name:'Printed Bookmark',
    price: '₹50',
    category: 'printed'
    img: 'https://via.placeholder.com/150/eedbff/6a5acd?text=bookmark', 
    sold: false 
 },
  {
function display(list) {
  document.getElementById('productPage').style.display = 'none';
  const container = document.getElementById('products');
  container.style.display = 'grid';
  container.innerHTML = '';

  list.forEach(item => {
    container.innerHTML += `
    <div class="card" onclick="openProduct('${item.name}')">
      ${item.sold ? '<div class="sold">SOLD</div>' : ''}
      <img src="${item.img}">
      <h4>${item.name}</h4>
      <p>${item.price}</p>
    </div>`;
  });
}

function filter(category) {
  if(category === 'all') return display(items);
  display(items.filter(i => i.category === category));
}

function showAll() {
  display(items);
}

function scrollToProducts() {
  document.getElementById('products').scrollIntoView({behavior: 'smooth'});
}

function orderWhatsApp(product = '') {
  const phone = '919958676897';
  const message = 'Hello, I want to order';
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
}

function openProduct(name) {
  const item = items.find(i => i.name === name);
  document.getElementById('products').style.display = 'none';

  const page = document.getElementById('productPage');
  page.style.display = 'block';

  page.innerHTML = `
    <button class="back" onclick="showAll()">← Back</button>
    <img src="${item.img}" style="width:100%;border-radius:15px">
    <h2>${item.name}</h2>
    <p>${item.price}</p>
    <button onclick="orderWhatsApp('${item.name}')" style="width:100%;padding:10px;border:none;border-radius:10px;background:#d9ccff">
      Order on WhatsApp
    </button>
  `;
}

display(items);
</script></body>
</html>
