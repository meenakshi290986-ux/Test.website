<!DOCTYPE html>
<html>
<head>
<title>Prakriti Store 💜</title>

<style>
body {
  font-family: Arial;
  background: #e6d6ff; /* LAVENDER */
  margin: 0;
  text-align: center;
}

/* SECTION */
.section {
  margin: 20px;
}

/* SCROLL CONTAINER */
.scroll-container {
  position: relative;
}

/* HORIZONTAL SCROLL */
.scroll {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 10px 40px;
  scroll-behavior: smooth;
}

/* CARD */
  .card {
  min-width: 75%;
  max-width: 75%;
  background: white;
  padding: 12px;
  border-radius: 20px;
  flex-shrink: 0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 15px;
}

/* BUTTON */
button {
  background: #b57edc;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 8px;
  margin-top: 5px;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 40%;
  background: #b57edc;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 50%;
  z-index: 1;
}

.left {
  left: 0;
}

.right {
  right: 0;
}
</style>

</head>

<body>

<h1>Prakriti Bookmark Store 💜</h1>

<!-- CUTE BOOKMARKS -->
<div class="section">
  <h2>handmade Bookmarks 🎀</h2>

  <div class="scroll-container">

    <button class="arrow left" onclick="scrollLeft('scroll1')">◀</button>

    <div class="scroll" id="scroll1">

      <div class="card">
        <img src="https://picsum.photos/200/200">
        <h4>Floral</h4>
        <p>₹50</p>
      </div>

      <div class="card">
        <img src="https://picsum.photos/200/201">
        <h4>Anime</h4>
        <p>₹70</p>
      </div>

      <div class="card">
        <img src="https://picsum.photos/200/202">
        <h4>Custom</h4>
        <p>₹90</p>
      </div>

    </div>

    <button class="arrow right" onclick="scrollRight('scroll1')">▶</button>

  </div>
</div>

<!-- HANDMADE CARDS -->
<div class="section">
  <h2>Handmade Cards 🎨</h2>

  <div class="scroll-container">

    <button class="arrow left" onclick="scrollLeft('scroll2')">◀</button>

    <div class="scroll" id="scroll2">

      <div class="card">
        <img src="https://picsum.photos/200/203">
        <h4>Birthday</h4>
        <p>₹120</p>
      </div>

      <div class="card">
        <img src="https://picsum.photos/200/204">
        <h4>Love</h4>
        <p>₹150</p>
      </div>

    </div>

    <button class="arrow right" onclick="scrollRight('scroll2')">▶</button>

  </div>
</div>

<!-- PRINTED BOOKMARKS -->
<div class="section">
  <h2>Printed Bookmarks 📚</h2>

  <div class="scroll-container">

    <button class="arrow left" onclick="scrollLeft('scroll3')">◀</button>

    <div class="scroll" id="scroll3">

      <div class="card">
        <img src="https://picsum.photos/200/205">
        <h4>Minimal</h4>
        <p>₹60</p>
      </div>

      <div class="card">
        <img src="https://picsum.photos/200/206">
        <h4>Aesthetic</h4>
        <p>₹80</p>
      </div>

    </div>

    <button class="arrow right" onclick="scrollRight('scroll3')">▶</button>

  </div>
</div>

<script>
function scrollLeft(id) {
  document.getElementById(id).scrollBy({
    left: -200,
    behavior: 'smooth'
  });
}

function scrollRight(id) {
  document.getElementById(id).scrollBy({
    left: 200,
    behavior: 'smooth'
  });
}
</script>

</body>
</html>
