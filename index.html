<!DOCTYPE html>
<html>
<head>
<title>Prakriti Bookmark Store (Test)</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #ffe6f0;
}

/* PRODUCT ROW */
#productRow {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  padding: 10px;
  scroll-behavior: smooth;
}

.card {
  min-width: 160px;
  background: white;
  padding: 10px;
  border-radius: 15px;
  cursor: pointer;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: hotpink;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 5px;
}
</style>

</head>

<body>

<h1>Prakriti Bookmark Store 💖</h1>

<h2>Cute Bookmarks 🎀</h2>

<!-- VIEW ALL BUTTON -->
<button onclick="viewAll()">View All</button>

<!-- PRODUCTS -->
<div id="productRow">

  <!-- PRODUCT 1 -->
  <div class="card" onclick="showDetails('p1')">
    <img src="https://via.placeholder.com/150">
    <p>₹50</p>
  </div>

  <!-- PRODUCT 2 -->
  <div class="card" onclick="showDetails('p2')">
    <img src="https://via.placeholder.com/150">
    <p>₹70</p>
  </div>

  <!-- PRODUCT 3 -->
  <div class="card" onclick="showDetails('p3')">
    <img src="https://via.placeholder.com/150">
    <p>₹90</p>
  </div>

</div>

<!-- DETAILS -->
<div id="details" style="margin-top:20px;"></div>

<script>

/* VIEW ALL */
function viewAll() {
  document.getElementById("productRow").style.flexWrap = "wrap";
  document.getElementById("productRow").style.overflowX = "hidden";
}

/* PRODUCT DETAILS */
function showDetails(product) {

  let content = "";

  if(product === "p1") {
    content = `
      <h3>Floral Bookmark</h3>
      <p>Price: ₹50</p>
      <p>Handmade cute floral design 🌸</p>
      <a href="https://wa.me/919958676897?text=Hi%20I%20want%20to%20order%20Floral%20Bookmark%20for%20₹50" target="_blank">
      <button>Buy Now</button>
      </a>
    `;
  }

  if(product === "p2") {
    content = `
      <h3>Anime Bookmark</h3>
      <p>Price: ₹70</p>
      <p>Perfect for anime lovers 💖</p>
      <a href="https://wa.me/919958676897?text=Hi%20I%20want%20to%20order%20Anime%20Bookmark%20for%20₹70" target="_blank">
      <button>Buy Now</button>
      </a>
    `;
  }

  if(product === "p3") {
    content = `
      <h3>Custom Bookmark</h3>
      <p>Price: ₹90</p>
      <p>Personalized with your name ✨</p>
      <a href="https://wa.me/919958676897?text=Hi%20I%20want%20to%20order%20Custom%20Bookmark%20for%20₹90" target="_blank">
      <button>Buy Now</button>
      </a>
    `;
  }

  document.getElementById("details").innerHTML = content;
}

</script>

</body>
</html>
